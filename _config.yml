title: QuantEcon
description: Open source tools for computational economics — lecture series, textbooks, and code libraries in Python and Julia
keywords: QuantEcon, Quantitative Economics, Economics, Sloan, Alfred P. Sloan Foundation, Tom J. Sargent, John Stachurski

timezone: Australia/Sydney
google_analytics: G-609ZCT25LS

# Site host for absolute URLs (og:url, share links, sitemap). The legacy
# GitHub Pages builder injected this automatically; the Actions build does not.
url: "https://quantecon.org"

# baseurl: /quantecon-jekyll-theme/
baseurl: /

sass:
   sass_dir: /assets/sass
   style: :compressed

repository: QuantEcon/website

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/bundle
  - PLAN-IMPROVEMENTS.md

collections:
  lectures:
  projects:
  workshops:
    output: false
  team-members:
    people: true

defaults:
  -
    scope:
      type: "lectures"
    values:
      order: 99
  -
    scope:
      type: "projects"
    values:
      order: 99
  -
    scope:
      path: ""
    values:
      layout: 'default'
  
plugins:
  - jekyll-redirect-from