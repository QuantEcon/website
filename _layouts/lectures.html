---
layout: default
---

{{ content }}

{% assign sorted_lectures = site.lectures | sort: 'order' %}

<div class="row row-cols-1 row-cols-md-2 g-4">
  {% for lecture in sorted_lectures %}
  <div class="col">
    <div class="qe-card">
      <a href="{{ lecture.link }}" target="_blank">
        <div class="d-flex align-items-start">
          <div class="flex-shrink-0 me-3">
            <img src="/assets/img/projects/{{ lecture.image }}" alt="" style="width: 48px; border-radius: 6px;">
          </div>
          <div>
            <h3 style="font-size: 1.1rem; font-weight: 700; margin: 0 0 0.25rem 0; color: #283039;">
              {{ lecture.name }}
              {% if lecture.lang == 'python' %}
              <span class="qe-badge qe-badge--python">Python</span>
              {% elsif lecture.lang == 'julia' %}
              <span class="qe-badge qe-badge--julia">Julia</span>
              {% endif %}
            </h3>
            <p style="margin: 0; font-size: 0.9rem; color: #666;">{{ lecture.description }}</p>
          </div>
        </div>
      </a>
    </div>
  </div>
  {% endfor %}
</div>
